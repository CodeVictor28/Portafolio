[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/social/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/perfil.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
